  <div class="modal-overlay" id="modalOverlay" onclick="ModalModule.handleOverlayClick(event)">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- ============ TOAST ============ -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ============ LOADING ============ -->
  <div class="global-loading" id="globalLoading" style="display:none;">
    <div class="global-loading-content">
      <div class="loading-spinner loading-spinner--lg"></div>
      <div class="loading-text" id="globalLoadingText">泥섎━ 以묒엯?덈떎...</div>
      <div class="progress-bar" id="globalProgressBar" style="display:none;">
        <div class="progress-bar__fill" id="globalProgressFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- ============ GENERAL MERGE OVERLAY ============ -->
  <div class="gm-overlay" id="gmOverlay" onclick="GeneralMerge._handleOverlayClick(event)">
    <div class="gm-panel" id="gmPanel">
      <!-- Header -->
      <div class="gm-header">
        <div class="gm-title">
          <i data-lucide="layers" style="width:16px;height:16px;color:#2563eb"></i>
          ?쇰컲 ?뚯씪 蹂묓빀
        </div>
        <button class="btn btn--icon btn--ghost" onclick="GeneralMerge.close()">
          <i data-lucide="x" style="width:18px;height:18px"></i>
        </button>
      </div>

      <!-- Drop zone -->
      <div class="gm-dropzone" id="gmDropzone" onclick="document.getElementById('gmFileInput').click()">
        <input type="file" id="gmFileInput" multiple accept=".pdf,.hwp,.hwpx" hidden>
        <i data-lucide="file-plus" style="width:24px;height:24px;opacity:0.35"></i>
        <span>?대┃ ?먮뒗 ?쒕옒洹명븯???뚯씪 異붽?</span>
        <span class="gm-dropzone-sub">PDF 쨌 HWP 쨌 HWPX</span>
      </div>

      <!-- File list -->
      <div class="gm-file-list" id="gmFileList"></div>

      <!-- Footer -->
      <div class="gm-footer">
        <span class="gm-file-count" id="gmFileCount">0媛??뚯씪</span>
        <button class="btn btn--primary btn--sm" onclick="GeneralMerge.merge()">
          <i data-lucide="layers" style="width:13px;height:13px"></i> ?뚯씪 蹂묓빀
        </button>
      </div>

      <!-- Format selection sub-dialog -->
      <div class="gm-format-dialog" id="gmFormatDialog" style="display:none;">
        <div class="gm-format-panel">
          <h4 class="gm-format-title">?ㅼ슫濡쒕뱶 ?뺤떇 ?좏깮</h4>
          <p class="gm-format-desc">?먰븯???뺤떇???좏깮 ???ㅼ슫濡쒕뱶?섏꽭??</p>
          <div class="gm-format-checks">
            <label class="gm-format-check">
              <input type="checkbox" id="gfPdf" checked> PDF
            </label>
            <label class="gm-format-check">
              <input type="checkbox" id="gfHwp"> HWP
            </label>
            <label class="gm-format-check">
              <input type="checkbox" id="gfHwpx"> HWPX
            </label>
          </div>
          <div class="gm-format-actions">
            <button class="btn btn--primary btn--sm" style="flex:1;" onclick="GeneralMerge.downloadSelected()">
              <i data-lucide="download" style="width:13px;height:13px"></i> ?ㅼ슫濡쒕뱶
            </button>
            <button class="btn btn--ghost btn--sm" style="flex:1;" onclick="GeneralMerge.closeFormatDialog()">痍⑥냼</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
